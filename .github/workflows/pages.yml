name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web artifact
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install native raylib system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgl1-mesa-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxcursor-dev

      - name: Check formatting
        run: zig fmt build.zig src/*.zig --check

      - name: Run tests
        run: zig build test

      - name: Run web JavaScript transport tests
        run: |
          node --check web/zigfall_transport.mjs
          node --check web/zigfall_transport_emscripten.js
          node --check web/zigfall_invite.mjs
          node --check web/zigfall_invite_emscripten.js
          node --check web/zigfall_profile.mjs
          node --check web/zigfall_profile_emscripten.js
          node --check web/vendor/patch-trystero-bundle.mjs
          node --check web/vendor/trystero-nostr.bundle.mjs
          node --check tools/test_trystero_pkt_limit.mjs
          node --check tools/test_zigfall_transport_adapter.mjs
          node --check tools/test_zigfall_invite.mjs
          node --check tools/test_zigfall_profile.mjs
          node tools/test_trystero_pkt_limit.mjs
          node tools/test_zigfall_transport_adapter.mjs
          node tools/test_zigfall_invite.mjs
          node tools/test_zigfall_profile.mjs

      - name: Build native
        run: zig build

      - name: Build web release
        run: zig build -Dtarget=wasm32-emscripten -Doptimize=ReleaseSmall

      - name: Prepare Pages artifact
        run: |
          cp zig-out/web/zigfall.html zig-out/web/index.html
          touch zig-out/web/.nojekyll

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: zig-out/web

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy Pages artifact
        id: deployment
        uses: actions/deploy-pages@v4
