<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Zigfall</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #090c18;
        --panel: #12192b;
        --panel-border: #43547d;
        --text: #e6edff;
        --text-dim: #93a4c7;
        --accent: #5bd6ff;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        overflow: hidden;
        background: radial-gradient(circle at top, #17213b 0, var(--bg) 46rem);
        color: var(--text);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.75rem;
        padding: 0.75rem;
      }

      .topbar,
      .statusbar,
      .stage {
        width: min(1100px, 100%);
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 1rem;
        min-height: 3.5rem;
        padding: 0.65rem 0.85rem;
        border: 1px solid rgba(67, 84, 125, 0.72);
        border-radius: 0.9rem;
        background: rgba(18, 25, 43, 0.9);
        box-shadow: 0 18px 48px rgba(0, 0, 0, 0.26);
      }

      h1 {
        margin: 0;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        font-size: clamp(1.15rem, 2.4vw, 1.65rem);
      }

      .subtitle {
        margin: 0.2rem 0 0;
        color: var(--text-dim);
        font-size: 0.9rem;
      }

      .source-link {
        flex: 0 0 auto;
        color: var(--bg);
        background: var(--accent);
        border-radius: 999px;
        padding: 0.55rem 0.85rem;
        font-weight: 700;
        text-decoration: none;
      }

      .source-link:focus-visible,
      .source-link:hover {
        outline: 2px solid var(--text);
        outline-offset: 3px;
      }

      .stage {
        flex: 1 1 auto;
        min-height: 0;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      /* Canvas must not have border or padding, or raylib mouse coordinates are wrong. */
      canvas.emscripten {
        display: block;
        width: min(100%, calc((100vh - 8.5rem) * 1100 / 720));
        max-width: 1100px;
        height: auto;
        max-height: calc(100vh - 8.5rem);
        aspect-ratio: 1100 / 720;
        border: 0 none;
        padding: 0;
        background: #000;
        outline: 1px solid rgba(91, 214, 255, 0.2);
        box-shadow: 0 24px 72px rgba(0, 0, 0, 0.44);
      }

      .statusbar {
        min-height: 1.8rem;
        display: grid;
        grid-template-columns: auto 1fr auto;
        align-items: center;
        gap: 0.65rem;
        color: var(--text-dim);
        font-size: 0.85rem;
      }

      .spinner {
        width: 1rem;
        height: 1rem;
        border: 0.18rem solid rgba(230, 237, 255, 0.18);
        border-top-color: var(--accent);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      #progress {
        width: min(18rem, 34vw);
        accent-color: var(--accent);
      }

      @media (max-width: 640px) {
        body {
          padding: 0.5rem;
          gap: 0.5rem;
        }

        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .subtitle {
          display: none;
        }

        canvas.emscripten {
          width: min(100%, calc((100vh - 8rem) * 1100 / 720));
          max-height: calc(100vh - 8rem);
        }
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>Zigfall</h1>
        <p class="subtitle">Advanced falling-block puzzle built with Zig and raylib.</p>
      </div>
      <a class="source-link" href="https://github.com/dnouri/Zigfall" rel="noopener">GitHub</a>
    </header>

    <main class="stage" aria-label="Zigfall game">
      <canvas class="emscripten" id="canvas" oncontextmenu="event.preventDefault()" tabindex="-1" aria-label="Zigfall game canvas"></canvas>
    </main>

    <section class="statusbar" aria-live="polite">
      <div class="spinner" id="spinner" aria-hidden="true"></div>
      <div id="status">Downloading...</div>
      <progress id="progress" max="100" value="0" hidden></progress>
    </section>

    <script>
      // Space, Enter, and arrows are game controls; Slash is Player 2's
      // local-versus 180-rotate key. Prevent browser scroll/quick-find defaults
      // when the game owns focus, but preserve normal focused UI controls/links.
      const gameDefaultCodes = new Set(["Space", "Enter", "ArrowLeft", "ArrowRight", "ArrowUp", "ArrowDown", "Slash"]);

      function isBrowserControlTarget(target) {
        return target instanceof Element && target.closest("a[href], input, textarea, select, button, [contenteditable='true'], [contenteditable='']");
      }

      window.addEventListener("keydown", (event) => {
        if (gameDefaultCodes.has(event.code) && !isBrowserControlTarget(event.target)) {
          event.preventDefault();
        }
      }, { capture: true });

      var statusElement = document.getElementById("status");
      var progressElement = document.getElementById("progress");
      var spinnerElement = document.getElementById("spinner");
      var canvasElement = document.getElementById("canvas");

      canvasElement.addEventListener("webglcontextlost", function(event) {
        alert("WebGL context lost. Reload the page to continue.");
        event.preventDefault();
      }, false);

      var Module = {
        print: function() {
          console.log.apply(console, arguments);
        },
        printErr: function() {
          console.error.apply(console, arguments);
        },
        canvas: canvasElement,
        preRun: [function() {
          function hasTransport() {
            return globalThis.ZigfallTransport && typeof globalThis.ZigfallTransport.statusCode === "function";
          }

          function hasInvite() {
            return globalThis.ZigfallInvite && typeof globalThis.ZigfallInvite.createHostRoom === "function";
          }

          function hasProfile() {
            return globalThis.ZigfallProfile && typeof globalThis.ZigfallProfile.card === "function";
          }

          if (hasTransport() && hasInvite() && hasProfile()) return;

          var dependency = "zigfall_web_helpers";
          var imports = [];
          Module.addRunDependency(dependency);

          if (!hasTransport()) {
            imports.push(import("./zigfall_transport.mjs").then(function() {
              if (!hasTransport()) {
                throw new Error("zigfall_transport.mjs did not install globalThis.ZigfallTransport");
              }
            }).catch(function(err) {
              globalThis.ZigfallTransportLoadError = err;
              console.error("[ZigfallTransport] failed to load", err);
              throw err;
            }));
          }

          if (!hasInvite()) {
            imports.push(import("./zigfall_invite.mjs").then(function() {
              if (!hasInvite()) {
                throw new Error("zigfall_invite.mjs did not install globalThis.ZigfallInvite");
              }
            }).catch(function(err) {
              globalThis.ZigfallInviteLoadError = err;
              console.error("[ZigfallInvite] failed to load", err);
              throw err;
            }));
          }

          if (!hasProfile()) {
            imports.push(import("./zigfall_profile.mjs").then(function() {
              if (!hasProfile()) {
                throw new Error("zigfall_profile.mjs did not install globalThis.ZigfallProfile");
              }
            }).catch(function(err) {
              globalThis.ZigfallProfileLoadError = err;
              console.error("[ZigfallProfile] failed to load", err);
              throw err;
            }));
          }

          Promise.all(imports).catch(function() {
            Module.setStatus("Web helpers failed to load; see JavaScript console.");
          }).finally(function() {
            Module.removeRunDependency(dependency);
          });
        }],
        setStatus: function(text) {
          if (!Module.setStatus.last) Module.setStatus.last = { time: Date.now(), text: "" };
          if (text === Module.setStatus.last.text) return;

          var match = text.match(/([^()]+)\((\d+(?:\.\d+)?)\/(\d+)\)/);
          var now = Date.now();
          if (match && now - Module.setStatus.last.time < 30) return;

          Module.setStatus.last.time = now;
          Module.setStatus.last.text = text;

          if (match) {
            statusElement.textContent = match[1].trim();
            progressElement.value = parseFloat(match[2]) * 100;
            progressElement.max = parseFloat(match[3]) * 100;
            progressElement.hidden = false;
            spinnerElement.hidden = false;
          } else {
            statusElement.textContent = text || "Ready";
            progressElement.hidden = true;
            spinnerElement.hidden = !text || text === "All downloads complete.";
          }
        },
        totalDependencies: 0,
        monitorRunDependencies: function(left) {
          this.totalDependencies = Math.max(this.totalDependencies, left);
          Module.setStatus(left ? "Preparing... (" + (this.totalDependencies - left) + "/" + this.totalDependencies + ")" : "All downloads complete.");
        }
      };

      Module.setStatus("Downloading...");
      window.onerror = function() {
        Module.setStatus("Exception thrown; see JavaScript console.");
        spinnerElement.hidden = true;
        Module.setStatus = function(text) {
          if (text) console.error("[post-exception status] " + text);
        };
      };

      (function() {
        try {
          if (new URLSearchParams(window.location.search).get("zf_debug") !== "1") return;
        } catch (_err) {
          return;
        }

        function jsonClone(value) {
          if (value === undefined) return null;
          return JSON.parse(JSON.stringify(value, function(_key, nested) {
            if (typeof nested === "number") return Number.isFinite(nested) ? nested : null;
            if (typeof nested === "bigint") return nested.toString();
            if (typeof nested === "function" || typeof nested === "symbol") return undefined;
            return nested === undefined ? null : nested;
          }));
        }

        function numberOrNull(value) {
          return typeof value === "number" && Number.isFinite(value) ? value : null;
        }

        function stringOrNull(value) {
          return typeof value === "string" ? value : null;
        }

        function readTransportSnapshot(warnings) {
          var transport = globalThis.ZigfallTransport;
          if (!transport || typeof transport.debugSnapshot !== "function") {
            warnings.push("ZigfallTransport.debugSnapshot() is unavailable.");
            return null;
          }
          try {
            return jsonClone(transport.debugSnapshot());
          } catch (err) {
            warnings.push("ZigfallTransport.debugSnapshot() failed: " + (err && err.message ? err.message : String(err)));
            return null;
          }
        }

        function makeSummary(transport) {
          var fake = transport && transport.fake === true;
          var peers = transport && transport.peers ? transport.peers : {};
          var send = transport && transport.send ? transport.send : {};
          var incoming = transport && transport.incoming ? transport.incoming : {};
          var health = transport && transport.health ? transport.health : {};
          return {
            kind: transport ? (fake ? "fake-broadcast-channel" : "trystero-webrtc") : "missing",
            fake: !!fake,
            room: transport ? stringOrNull(transport.roomId) : null,
            status: transport ? stringOrNull(transport.statusName) : null,
            statusCode: transport ? numberOrNull(transport.status) : null,
            peer: {
              count: numberOrNull(peers.count),
              selectedPeerId: stringOrNull(peers.selectedPeerId),
              extraPeerCount: numberOrNull(peers.extraPeerCount),
              hadSelectedPeer: typeof peers.hadSelectedPeer === "boolean" ? peers.hadSelectedPeer : null
            },
            send: {
              attempts: numberOrNull(send.attempts),
              pending: numberOrNull(send.pending),
              pendingBytes: numberOrNull(send.pendingBytes),
              rejected: numberOrNull(send.rejected)
            },
            receive: {
              depth: numberOrNull(incoming.depth),
              capacity: numberOrNull(incoming.capacity),
              enqueuedTotal: numberOrNull(incoming.enqueuedTotal),
              dequeuedTotal: numberOrNull(incoming.dequeuedTotal),
              droppedQueueFull: numberOrNull(incoming.droppedQueueFull)
            },
            depth: numberOrNull(incoming.depth),
            health: {
              code: numberOrNull(health.code),
              name: stringOrNull(health.name),
              message: stringOrNull(health.message)
            }
          };
        }

        function readAppSnapshot(warnings) {
          if (!Module || Module.calledRun !== true) return null;
          if (typeof Module.ccall !== "function") {
            warnings.push("Zig app debug snapshot is unavailable because Module.ccall is missing.");
            return null;
          }
          try {
            return jsonClone(JSON.parse(Module.ccall("zigfall_debug_snapshot_json", "string", [], [])));
          } catch (err) {
            warnings.push("Zig app debug snapshot failed: " + (err && err.message ? err.message : String(err)));
            return null;
          }
        }

        function pageSnapshot() {
          return {
            modulePresent: typeof Module === "object" && Module !== null,
            moduleCalledRun: !!(Module && Module.calledRun === true),
            wasmReady: !!(Module && Module.calledRun === true),
            statusText: statusElement ? statusElement.textContent || "" : "",
            canvas: canvasElement ? {
              width: canvasElement.width,
              height: canvasElement.height,
              clientWidth: canvasElement.clientWidth,
              clientHeight: canvasElement.clientHeight
            } : null
          };
        }

        var facade = Object.freeze({
          snapshot: function() {
            var capturedAtMs = Date.now();
            var warnings = [];
            var transport = readTransportSnapshot(warnings);
            if (transport && transport.fake === true) {
              warnings.push("Fake BroadcastChannel transport is active; this browser-test/local shim is not live WebRTC/Trystero evidence.");
            }
            return jsonClone({
              schemaVersion: 1,
              capturedAtMs: capturedAtMs,
              capturedAtIso: new Date(capturedAtMs).toISOString(),
              page: pageSnapshot(),
              transport: transport,
              summary: makeSummary(transport),
              warnings: warnings,
              app: readAppSnapshot(warnings)
            });
          }
        });

        Object.defineProperty(window, "ZigfallDebug", {
          value: facade,
          writable: false,
          enumerable: false,
          configurable: false
        });
      })();
    </script>

    <!-- Module.preRun imports zigfall_transport.mjs, zigfall_invite.mjs, and zigfall_profile.mjs before WASM main starts. -->

    <!-- Emscripten replaces this token with the zigfall.js loader. -->
    {{{ SCRIPT }}}
  </body>
</html>
